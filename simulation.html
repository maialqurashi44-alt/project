<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>محاكاة الهرمونات</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>🧪 محاكاة الهرمونات</h1>

    <div class="sim-box">

        <!-- الإستروجين -->
        <div class="hormone">
            <span>الإستروجين</span>

            <button onclick="decrease('estrogen')">➖</button>

            <div class="bar">
                <div id="estrogenBar" class="fill"></div>
            </div>

            <button onclick="increase('estrogen')">➕</button>
        </div>

        <!-- البروجسترون -->
        <div class="hormone">
            <span>البروجسترون</span>

            <button onclick="decrease('progesterone')">➖</button>

            <div class="bar">
                <div id="progesteroneBar" class="fill"></div>
            </div>

            <button onclick="increase('progesterone')">➕</button>
        </div>

        <!-- HCG -->
        <div class="hormone">
            <span>hCG</span>

            <button onclick="decrease('hcg')">➖</button>

            <div class="bar">
                <div id="hcgBar" class="fill"></div>
            </div>

            <button onclick="increase('hcg')">➕</button>
        </div>

        <!-- LH -->
        <div class="hormone">
            <span>LH</span>

            <button onclick="decrease('lh')">➖</button>

            <div class="bar">
                <div id="lhBar" class="fill"></div>
            </div>

            <button onclick="increase('lh')">➕</button>
        </div>

    </div>

    <p id="result"></p>

</div>

<script>

// القيم الابتدائية
let levels = {
    estrogen: 50,
    progesterone: 50,
    hcg: 50,
    lh: 50
};

// تحديث البار (مهم جداً)
function updateBar(name) {
    let bar = document.getElementById(name + "Bar");

    bar.style.width = levels[name] + "%";

    if (levels[name] < 40) {
        bar.style.background = "orange";
    } else if (levels[name] > 70) {
        bar.style.background = "red";
    } else {
        bar.style.background = "lime";
    }
}

// زيادة
function increase(name) {
    if (levels[name] < 100) {
        levels[name] += 10;
        updateBar(name);
        showEffect(name);
    }
}

// نقصان
function decrease(name) {
    if (levels[name] > 0) {
        levels[name] -= 10;
        updateBar(name);
        showEffect(name);
    }
}

// شرح علمي تفصيلي 🔥
function showEffect(name) {
    let text = "";

    if (name === "estrogen") {
        if (levels[name] < 40) {
            text = "⚠️ نقص هرمون الإستروجين: قد يؤدي إلى ضعف بطانة الرحم، مما يزيد من خطر الإجهاض أو عدم ثبات الحمل، وقد يؤثر على تدفق الدم للجنين.";
        } 
        else if (levels[name] > 70) {
            text = "⚠️ زيادة هرمون الإستروجين: قد تسبب ارتفاع ضغط الدم أثناء الحمل، وزيادة خطر اضطرابات المشيمة، وقد تؤثر على توازن الهرمونات.";
        } 
        else {
            text = "✅ مستوى الإستروجين طبيعي: يدعم نمو الرحم ويحسن تدفق الدم للجنين.";
        }
    }

    else if (name === "progesterone") {
        if (levels[name] < 40) {
            text = "⚠️ نقص هرمون البروجسترون: قد يؤدي إلى عدم ثبات بطانة الرحم، مما يزيد احتمال الإجهاض المبكر.";
        } 
        else if (levels[name] > 70) {
            text = "⚠️ زيادة البروجسترون: قد تسبب خمول، تعب شديد، دوخة، واضطرابات في الجهاز الهضمي.";
        } 
        else {
            text = "✅ مستوى البروجسترون طبيعي: يساعد على تثبيت الحمل ومنع انقباضات الرحم.";
        }
    }

    else if (name === "hcg") {
        if (levels[name] < 40) {
            text = "⚠️ انخفاض هرمون hCG: قد يدل على ضعف الحمل أو احتمال فقدانه في مراحله المبكرة.";
        } 
        else if (levels[name] > 70) {
            text = "⚠️ ارتفاع هرمون hCG: قد يشير إلى حمل بتوأم أو في بعض الحالات مشاكل مثل الحمل العنقودي.";
        } 
        else {
            text = "✅ مستوى hCG طبيعي: يساعد على دعم الحمل في مراحله الأولى.";
        }
    }

    else if (name === "lh") {
        if (levels[name] < 40) {
            text = "⚠️ نقص هرمون LH: قد يؤدي إلى ضعف التبويض وتأخر حدوث الحمل.";
        } 
        else if (levels[name] > 70) {
            text = "⚠️ ارتفاع هرمون LH: قد يكون مرتبط بمتلازمة تكيس المبايض ويؤثر على انتظام التبويض.";
        } 
        else {
            text = "✅ مستوى LH طبيعي: يساعد على حدوث التبويض بشكل سليم.";
        }
    }

    document.getElementById("result").innerText = text;
}

// تشغيل أولي (ضروري)
window.onload = function() {
    for (let h in levels) {
        updateBar(h);
    }
};

</script>

</body>
</html>

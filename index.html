<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مختبر الهرمونات</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- شاشة البداية -->
<div id="startScreen">
  <h1>🧪 مختبر الهرمونات</h1>
  <p>استكشف تأثير الهرمونات على نمو الجنين 👶</p>
  <button id="startBtn">ابدأ</button>
</div>

<!-- التطبيق -->
<div id="app">

  <button id="menuBtn">☰</button>

  <!-- القائمة -->
  <div id="sidebar">
    <h3>الهرمونات</h3>

    <!-- Estrogen -->
    <div class="hormone" draggable="true" id="h1">
      <div class="molecule"><span></span><span></span><span></span></div>
    </div>
    <p>Estrogen</p>

    <!-- Progesterone -->
    <div class="hormone" draggable="true" id="h2">
      <div class="molecule"><span></span><span></span><span></span><span></span></div>
    </div>
    <p>Progesterone</p>

    <!-- hCG -->
    <div class="hormone" draggable="true" id="h3">
      <div class="molecule"><span></span><span></span></div>
    </div>
    <p>hCG</p>

    <!-- LH -->
    <div class="hormone" draggable="true" id="h4">
      <div class="molecule"><span></span><span></span><span></span></div>
    </div>
    <p>LH</p>

    <div id="infoBox">اضغط على هرمون 👆</div>
  </div>

  <div class="container">
    <h1>🧪 المختبر</h1>

    <div id="tube"></div>

    <p id="result">النتيجة هنا...</p>

    <button id="resetBtn">🔄 إعادة</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

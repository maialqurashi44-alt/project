<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شرح الهرمون</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1 id="title"></h1>
    <p id="desc"></p>
    <p id="function"></p>
    <p id="problems"></p>

    <div style="display:flex; gap:10px; justify-content:center;">
        <button onclick="history.back()" class="btn">رجوع</button>
        <button onclick="nextPage()" class="btn">التالي</button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const hormone = params.get("hormone");

let title = "";
let desc = "";
let func = "";
let problems = "";

// Estrogen
if (hormone === "estrogen") {
    title = "🌸 هرمون الإستروجين";
    desc = "هرمون أنثوي أساسي أثناء الحمل.";
    func = "يساعد على نمو الرحم وتحسين تدفق الدم.";
    problems = "نقصه يسبب ضعف نمو الجنين، زيادته قد تسبب مشاكل بالمشيمة.";
}

// Progesterone
else if (hormone === "progesterone") {
    title = "🌼 هرمون البروجسترون";
    desc = "يحافظ على الحمل.";
    func = "يثبت بطانة الرحم ويحمي الجنين.";
    problems = "نقصه قد يسبب إجهاض، زيادته تسبب تعب ودوخة.";
}

// HCG
else if (hormone === "hcg") {
    title = "🤰 هرمون hCG";
    desc = "هرمون الحمل المبكر.";
    func = "يحافظ على إفراز البروجسترون.";
    problems = "ارتفاعه يدل على توأم، انخفاضه خطر على الحمل.";
}

// LH
else if (hormone === "lh") {
    title = "🧪 هرمون LH";
    desc = "ينظم التبويض.";
    func = "يساعد على إطلاق البويضة.";
    problems = "زيادته تدل على تكيس، نقصه يؤخر الحمل.";
}

document.getElementById("title").innerText = title;
document.getElementById("desc").innerText = desc;
document.getElementById("function").innerText = "📌 الوظيفة: " + func;
document.getElementById("problems").innerText = "⚠️ المشاكل: " + problems;

function nextPage() {
    window.location.href = "simulation.html";
}
</script>

</body>
</html>

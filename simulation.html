<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>محاكاة الهرمونات</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>🧪 محاكاة الهرمونات</h1>

    <div class="sim-box">

        <div class="hormone">
            <span>Estrogen</span>
            <button onclick="decrease('estrogen')">➖</button>
            <div class="bar"><div id="estrogenBar" class="fill"></div></div>
            <button onclick="increase('estrogen')">➕</button>
        </div>

        <div class="hormone">
            <span>Progesterone</span>
            <button onclick="decrease('progesterone')">➖</button>
            <div class="bar"><div id="progesteroneBar" class="fill"></div></div>
            <button onclick="increase('progesterone')">➕</button>
        </div>

        <div class="hormone">
            <span>HCG</span>
            <button onclick="decrease('hcg')">➖</button>
            <div class="bar"><div id="hcgBar" class="fill"></div></div>
            <button onclick="increase('hcg')">➕</button>
        </div>

        <div class="hormone">
            <span>LH</span>
            <button onclick="decrease('lh')">➖</button>
            <div class="bar"><div id="lhBar" class="fill"></div></div>
            <button onclick="increase('lh')">➕</button>
        </div>

    </div>

    <p id="result"></p>

</div>

<script>

let levels = {
    estrogen: 50,
    progesterone: 50,
    hcg: 50,
    lh: 50
};

function updateBar(name) {
    let bar = document.getElementById(name + "Bar");

    bar.style.width = levels[name] + "%";
    bar.style.display = "block";

    if (levels[name] < 40) {
        bar.style.background = "orange";
    } else if (levels[name] > 70) {
        bar.style.background = "red";
    } else {
        bar.style.background = "lime";
    }
}

function increase(name) {
    if (levels[name] < 100) {
        levels[name] += 10;
        updateBar(name);
        showEffect(name);
    }
}

function decrease(name) {
    if (levels[name] > 0) {
        levels[name] -= 10;
        updateBar(name);
        showEffect(name);
    }
}

function showEffect(name) {
    let text = "";

    // ESTROGEN
    if (name === "estrogen") {
        if (levels[name] < 40) {
            text = "⚠️ نقص الإستروجين: قد يؤدي إلى ضعف نمو بطانة الرحم، مما يزيد خطر الإجهاض أو تأخر نمو الجنين.";
        } else if (levels[name] > 70) {
            text = "⚠️ زيادة الإستروجين: قد تسبب ارتفاع ضغط الدم أثناء الحمل أو مشاكل في المشيمة.";
        } else {
            text = "✅ مستوى الإستروجين طبيعي ويساعد على نمو الرحم ودعم الجنين.";
        }
    }

    // PROGESTERONE
    else if (name === "progesterone") {
        if (levels[name] < 40) {
            text = "⚠️ نقص البروجسترون: قد يؤدي إلى عدم استقرار بطانة الرحم وزيادة خطر الإجهاض المبكر.";
        } else if (levels[name] > 70) {
            text = "⚠️ زيادة البروجسترون: قد تسبب خمول شديد، دوخة، واضطرابات في الجهاز الهضمي.";
        } else {
            text = "✅ مستوى البروجسترون طبيعي ويحافظ على استقرار الحمل.";
        }
    }

    // HCG
    else if (name === "hcg") {
        if (levels[name] < 40) {
            text = "⚠️ انخفاض هرمون hCG: قد يكون مؤشر على ضعف الحمل أو خطر فقدانه.";
        } else if (levels[name] > 70) {
            text = "⚠️ ارتفاع هرمون hCG: قد يدل على حمل بتوأم أو في بعض الحالات مشاكل مثل الحمل العنقودي.";
        } else {
            text = "✅ مستوى hCG طبيعي ويدعم استمرار الحمل في مراحله الأولى.";
        }
    }

    // LH
    else if (name === "lh") {
        if (levels[name] < 40) {
            text = "⚠️ نقص LH: قد يؤدي إلى ضعف التبويض وتأخر حدوث الحمل.";
        } else if (levels[name] > 70) {
            text = "⚠️ ارتفاع LH: قد يكون مرتبط بمتلازمة تكيس المبايض ويؤثر على انتظام التبويض.";
        } else {
            text = "✅ مستوى LH طبيعي ويساعد على حدوث التبويض بشكل سليم.";
        }
    }

    document.getElementById("result").innerText = text;
}

// تشغيل أولي (مهم عشان ما يختفي البار)
for (let h in levels) {
    updateBar(h);
}

</script>

</body>
</html>
